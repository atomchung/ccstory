name: release

on:
  push:
    tags:
      - "v*"

# A rerun is safe, but two release attempts for the same tag must not overlap.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Each job grants only the permissions it needs.
permissions: {}

jobs:
  build:
    name: Build and validate distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          project_version="$({
            python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              print(tomllib.load(pyproject)["project"]["version"])
          PY
          })"

          if [[ "${tag}" != v* || -z "${tag_version}" ]]; then
            echo "Expected a non-empty v* tag, got '${tag}'." >&2
            exit 1
          fi

          if [[ "${tag_version}" != "${project_version}" ]]; then
            echo "Tag version '${tag_version}' does not match pyproject.toml version '${project_version}'." >&2
            exit 1
          fi

          echo "Validated release version ${project_version}."

      - name: Install build tooling
        run: python -m pip install --disable-pip-version-check build twine

      - name: Build wheel and source distribution
        run: python -m build --wheel --sdist

      - name: Validate distributions
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t distributions < <(find dist -maxdepth 1 -type f -print)
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name '*.whl' -print)
          mapfile -t sdists < <(find dist -maxdepth 1 -type f -name '*.tar.gz' -print)

          if (( ${#distributions[@]} != 2 || ${#wheels[@]} != 1 || ${#sdists[@]} != 1 )); then
            echo "Expected exactly one wheel and one .tar.gz source distribution." >&2
            printf 'Found: %s\n' "${distributions[@]:-none}" >&2
            exit 1
          fi

          python -m twine check "${distributions[@]}"

      - name: Store distributions for publish jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ccstory/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

  publish-github:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Create release or refresh its artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          mapfile -t distributions < <(find dist -maxdepth 1 -type f -print | sort)

          if (( ${#distributions[@]} != 2 )); then
            echo "Expected two release artifacts, found ${#distributions[@]}." >&2
            exit 1
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; refreshing its distribution artifacts."
            gh release upload "${tag}" "${distributions[@]}" --clobber
          else
            gh release create "${tag}" "${distributions[@]}" \
              --verify-tag \
              --generate-notes \
              --title "${tag}"
          fi
