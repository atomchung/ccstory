name: refresh-prices

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Refresh prices table
        run: |
          python scripts/refresh_prices.py > diff_summary.txt
          cat diff_summary.txt
      - name: Create Pull Request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(pricing): refresh vendored LiteLLM model prices"
          title: "chore(pricing): refresh vendored LiteLLM model prices"
          body-path: diff_summary.txt
          branch: chore/refresh-prices
          delete-branch: true
